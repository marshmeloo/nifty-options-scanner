// ---- chart geometry ----
const W = 1060, H = 460, padL = 56, padR = 90, padT = 10, padB = 30;

const allPrices = [];
DATA.candles.forEach(c => { allPrices.push(c.h, c.l); });
DATA.levels.forEach(l => { allPrices.push(l.low, l.high); });
const pMin = Math.min(...allPrices), pMax = Math.max(...allPrices);
const pPad = (pMax - pMin) * 0.06;
const yMin = pMin - pPad, yMax = pMax + pPad;

function yOf(price) { return padT + (yMax - price) / (yMax - yMin) * plotH; }
const n = DATA.candles.length;
const slot = plotW / n;
function xOf(i) { return padL + i * slot + slot / 2; }

  svg += `<text x="${W-padR+8}" y="${y+4}" font-size="10" fill="#64748b">${price.toFixed(0)}</text>`;

});

  const h = Math.max(yBot - yTop, 2);
  svg += `<rect data-level="${idx}" x="${padL}" y="${yTop}" width="${plotW}" height="${h}"

});
