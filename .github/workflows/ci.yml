name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Compile check (catches syntax errors)
        run: python -m py_compile *.py

      - name: Lint with ruff
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Import sanity check
        run: |
          python -c "import config, models, data_source, plan_generator, risk_checker, price_action, scanner, trade_tracker, dhan_source, oi_analytics, nse_source, tradingview_source, resilient_source, trade_staging"
